kind = "web"
previewPath = "/"
title = "Gold Beauty Fashion By Shani Ranasinghe"
version = "1.0.0"
id = "artifacts/gold-beauty"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25515

[services.development]
run = "pnpm --filter @workspace/gold-beauty run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gold-beauty", "run", "build" ]
publicDir = "artifacts/gold-beauty/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25515"
BASE_PATH = "/"
